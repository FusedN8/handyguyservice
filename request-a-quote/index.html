<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Request a Quote - HandyGuy Service</title>
  <meta name="description" content="Request a quote from HandyGuy Service. Describe your project, upload pictures, and send your request.">
  <link rel="icon" href="../assets/images/favicon.jpg" sizes="32x32">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../quote-request/quote.css?v=3">
</head>
<body>
  <main class="page-shell">
    <section class="quote-panel" aria-labelledby="page-title">
      <header class="quote-header">
        <img class="quote-logo" src="../assets/images/logo.png" alt="HandyGuy Service" width="300" height="34">
        <div>
          <h1 id="page-title">Request a Quote</h1>
        </div>
      </header>

      <form class="quote-form" data-quote-form data-mode="new_client" enctype="multipart/form-data">
        <input type="hidden" name="mode" value="new_client">
        <input type="hidden" name="_subject" value="New quote request - HandyGuy Service">
        <input type="hidden" name="_template" value="table">
        <input type="hidden" name="_captcha" value="false">

        <label class="field-group" for="description">
          <span>Project description</span>
          <textarea id="description" name="description" placeholder="Briefly describe what you need done." rows="7" required></textarea>
        </label>

        <label class="upload-box" for="attachment">
          <input id="attachment" name="attachment" type="file" accept="image/*" multiple data-file-input>
          <span class="upload-title">Upload pictures</span>
          <span class="upload-meta" data-file-summary>No pictures selected</span>
        </label>

        <div class="contact-grid">
          <label class="field-group" for="name">
            <span>Name</span>
            <input id="name" name="name" type="text" autocomplete="name" required>
          </label>

          <label class="field-group" for="phone">
            <span>Phone number</span>
            <input id="phone" name="phone" type="tel" autocomplete="tel" required>
          </label>

          <label class="field-group zip-field" for="zipCode">
            <span>ZIP code</span>
            <input id="zipCode" name="zipCode" type="text" inputmode="numeric" autocomplete="postal-code" required>
          </label>
        </div>

        <button class="submit-button" type="submit">
          <span class="loading-dot" aria-hidden="true"></span>
          <span data-submit-text>Submit Request</span>
        </button>

        <div class="form-message" role="status" aria-live="polite" data-form-message></div>
      </form>
    </section>
  </main>

  <script src="../quote-request/quote.js?v=3"></script>
</body>
</html>
